name: Build GVU

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-a30:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/gvu-builder-a30
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download vendored deps
        run: |
          mkdir -p cross-compile/deps
          wget -q -O cross-compile/deps/openssl-1.1.1w.tar.gz \
            "https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz"
          wget -q -O cross-compile/deps/curl-8.7.1.tar.gz \
            "https://curl.se/download/curl-8.7.1.tar.gz"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cross-compile/miyoo-a30/Dockerfile.gvu
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Build inside Docker
        run: |
          mkdir -p build
          docker run --rm -v ${{ github.workspace }}:/gvu \
            ${{ env.IMAGE }}:latest \
            sh /gvu/cross-compile/miyoo-a30/build_inside_docker.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gvu-a30
          path: |
            build/gvu32
            build/fetch_subs32
            build/libs32/
            build/libs32_a30/

  build-brick:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/gvu-builder-brick
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download vendored deps
        run: |
          mkdir -p cross-compile/deps
          wget -q -O cross-compile/deps/openssl-1.1.1w.tar.gz \
            "https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz"
          wget -q -O cross-compile/deps/curl-8.7.1.tar.gz \
            "https://curl.se/download/curl-8.7.1.tar.gz"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cross-compile/trimui-brick/Dockerfile.gvu
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Build inside Docker
        run: |
          mkdir -p build
          docker run --rm -v ${{ github.workspace }}:/gvu \
            ${{ env.IMAGE }}:latest \
            sh /gvu/cross-compile/trimui-brick/build_inside_docker.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gvu-brick
          path: |
            build/gvu64
            build/fetch_subs64
            build/libs64/

  package:
    needs: [build-a30, build-brick]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure latest release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest \
              --title "Latest Build" \
              --notes "GVU universal build for spruceOS" \
            || true

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: build
          merge-multiple: true

      - name: Package universal zip
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
          SUBDL_KEY: ${{ secrets.SUBDL_KEY }}
        run: |
          # Write API key files if secrets are set
          [ -n "$TMDB_KEY" ] && printf '%s' "$TMDB_KEY" > .tmdb_key
          [ -n "$SUBDL_KEY" ] && printf '%s' "$SUBDL_KEY" > .subdl_key
          sh cross-compile/universal/package_gvu_universal.sh ${{ github.sha }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the zip (name includes version)
          ZIP=$(ls gvu_spruce_universal_v*.zip 2>/dev/null | head -1)
          if [ -n "$ZIP" ]; then
            # Also upload as a stable name for easy download
            cp "$ZIP" GVU.zip
            gh release upload latest GVU.zip --clobber
          else
            echo "::error::No zip file found"
            exit 1
          fi
